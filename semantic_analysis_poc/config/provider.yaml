# OpenAI-compatible Chat Completions provider config.
# Keep model/API settings externalized; do not hard-code secrets in source.

provider: openai_compatible
base_url: https://openrouter.ai/api/v1
api_key_env: OPENROUTER_API_KEY

# Set PHASE2_MODEL_ID, or replace this null with a literal OpenRouter model ID.
# Do not commit credentials.
model_id: null

temperature: 0
timeout_seconds: 180
max_output_tokens: 12000
max_retries: 1

headers:
  http_referer:
  x_title: Podcast Speaker AI Investment Mentor Phase 2 POC

# Optional. Fill these in for cost estimation if known for the selected model.
pricing_per_1m_tokens:
  input_usd:
  output_usd:
